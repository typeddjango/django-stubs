-   case: order_by_valid_fields
    installed_apps:
        - myapp
    main: |
        from myapp.models import Article, Author
        from django.db.models import F, OrderBy

        # Simple fields
        Article.objects.order_by("title")
        Article.objects.order_by("pk")
        Article.objects.order_by("id")

        # Descending
        Article.objects.order_by("-title")
        Article.objects.order_by("-pk")

        # Random ordering
        Article.objects.order_by("?")

        # FK traversal
        Article.objects.order_by("author__name")
        Article.objects.order_by("-author__name")

        # Multiple fields
        Article.objects.order_by("title", "-author__name")

        # Annotated fields
        Article.objects.annotate(foo=F("id")).order_by("foo")

        # Non-literal strings (skipped by validation)
        field: str = "title"
        Article.objects.order_by(field)

        # F expressions and OrderBy objects (not string literals, skipped)
        Article.objects.order_by(F("title"))
        Article.objects.order_by(OrderBy(F("title")))

        # earliest / latest
        Article.objects.earliest("title")
        Article.objects.latest("title")
        Article.objects.earliest("author__name")
        Article.objects.latest("-title")

        # FK id field
        Article.objects.order_by("author_id")
    files:
        -   path: myapp/__init__.py
        -   path: myapp/models.py
            content: |
                from django.db import models

                class Author(models.Model):
                    name = models.CharField(max_length=100)
                    email = models.EmailField()

                class Article(models.Model):
                    title = models.CharField(max_length=200)
                    content = models.TextField()
                    published = models.BooleanField(default=False)
                    author = models.ForeignKey(Author, on_delete=models.CASCADE)


-   case: order_by_invalid_fields
    installed_apps:
        - myapp
    main: |
        from myapp.models import Article, Author
        from typing import Literal

        # Non-existent field
        Article.objects.order_by("nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: author, author_id, content, id, published, title  [misc]

        # Invalid chained lookup
        Article.objects.order_by("author__nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: article, email, id, name  [misc]

        # Descending invalid
        Article.objects.order_by("-nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: author, author_id, content, id, published, title  [misc]

        # Literal typed invalid
        field: Literal["nonexistent"] = "nonexistent"
        Article.objects.order_by(field)  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: author, author_id, content, id, published, title  [misc]

        # earliest / latest with invalid fields
        Article.objects.earliest("nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: author, author_id, content, id, published, title  [misc]
        Article.objects.latest("nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: author, author_id, content, id, published, title  [misc]

        # Async variants
        async def test_async() -> None:
            await Article.objects.aearliest("nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: author, author_id, content, id, published, title  [misc]
            await Article.objects.alatest("nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: author, author_id, content, id, published, title  [misc]
    files:
        -   path: myapp/__init__.py
        -   path: myapp/models.py
            content: |
                from django.db import models

                class Author(models.Model):
                    name = models.CharField(max_length=100)
                    email = models.EmailField()

                class Article(models.Model):
                    title = models.CharField(max_length=200)
                    content = models.TextField()
                    published = models.BooleanField(default=False)
                    author = models.ForeignKey(Author, on_delete=models.CASCADE)
