        qs.order_by("field_a")
        qs.order_by("-field_b")
        qs.order_by("field_c")
        qs.order_by("field_a", "-field_b", "field_c", "name")
        qs.order_by("nonexistent")  # E: Cannot resolve keyword 'nonexistent' into field. Choices are: id, name  [misc]
