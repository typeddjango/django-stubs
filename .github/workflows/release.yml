name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}

jobs:
  build-and-publish-ext:
    runs-on: ubuntu-latest
    environment:
      name: release-ext
      url: https://pypi.org/p/django-stubs-ext
    permissions:
      id-token: write
    steps:
      - name: Install uv & Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.13"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
      - name: Build ext package
        run: uv build --package=django-stubs-ext
      - name: Publish ext to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [build-and-publish-ext]
    environment:
      name: release
      url: https://pypi.org/p/django-stubs
    permissions:
      id-token: write
    steps:
      - name: Install uv & Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.13"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
      - name: Build package
        run: uv build --package=django-stubs
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
