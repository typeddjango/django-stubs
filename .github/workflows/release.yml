name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}

jobs:
  build-and-publish-ext:
    runs-on: ubuntu-latest
    environment:
      name: release-ext
      url: https://pypi.org/p/django-stubs-ext
    permissions:
      id-token: write
    steps:
      - name: Install uv & Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          python-version: "3.13"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0
      - name: Build ext package
        run: uv build --package=django-stubs-ext
      - name: Publish ext to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [build-and-publish-ext]
    environment:
      name: release
      url: https://pypi.org/p/django-stubs
    permissions:
      id-token: write
    steps:
      - name: Install uv & Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          python-version: "3.13"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0
      - name: Build package
        run: uv build --package=django-stubs
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
